server.port=8080
spring.application.name=api-gateway

# ─── Route Definitions ───────────────────────────────────────────
# Each route maps a public /api/** path to an internal microservice.
# StripPrefix=1 removes /api so backends receive clean paths.

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=profile-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/profiles/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=post-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/posts/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[3].id=connection-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/connections/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[4].id=feed-service
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/feed/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[5].id=job-service
spring.cloud.gateway.routes[5].uri=http://localhost:8087
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/jobs/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# ─── CORS ──────────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[1]=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers[0]=X-Request-Id
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers[1]=X-RateLimit-Limit
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers[2]=X-RateLimit-Remaining
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# ─── Redis ───────────────────────────────────────────────────────
# Used for: token blacklist (logout), rate limiting.
# Without Redis the gateway still works — blacklist + rate limit degrade gracefully.
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ─── Gateway Custom Config ────────────────────────────────────────
gateway.user-service-uri=http://localhost:8081

gateway.public-paths[0]=/api/users/register
gateway.public-paths[1]=/api/users/login
gateway.public-paths[2]=/api/users/logout
gateway.public-paths[3]=/actuator
gateway.public-paths[4]=/health

gateway.auth-paths[0]=/api/users/login
gateway.auth-paths[1]=/api/users/register

# ─── JWT ──────────────────────────────────────────────────────────
# IMPORTANT: Override gateway.jwt.secret via environment variable in production:
#   GATEWAY_JWT_SECRET=your-production-secret-here
gateway.jwt.secret=your-secret-key-change-this-in-production-minimum-256-bits
gateway.jwt.expiration-ms=86400000

# ─── Rate Limiting ───────────────────────────────────────────────
gateway.rate-limit.enabled=true
gateway.rate-limit.requests-per-window=100
gateway.rate-limit.anonymous-requests-per-window=30
gateway.rate-limit.window-seconds=60

# ─── Actuator / Monitoring ────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,gateway
management.endpoint.health.show-details=when-authorized
management.endpoint.gateway.enabled=true
management.metrics.export.prometheus.enabled=true

# ─── Logging ──────────────────────────────────────────────────────
logging.level.com.linkedme.gateway=INFO
logging.level.com.linkedme.gateway.filter=INFO
logging.level.org.springframework.cloud.gateway=WARN
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
