server.port=8081
spring.application.name=user-service

# ─── H2 Database ───────────────────────────────────────────────
# In-memory database with PostgreSQL compatibility mode.
# MODE=PostgreSQL makes H2 behave like PostgreSQL so migration is seamless.
# DB_CLOSE_DELAY=-1 keeps the database alive as long as the JVM is running.
# DB_CLOSE_ON_EXIT=FALSE lets Spring manage the shutdown lifecycle.
spring.datasource.url=jdbc:h2:mem:linkedme_users;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── Connection Pool (HikariCP) ───────────────────────────────
# HikariCP is Spring Boot's default pool. These settings prevent
# connection leaks and keep the pool right-sized for development.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ─── H2 Console ───────────────────────────────────────────────
# Access at: http://localhost:8081/h2-console
# JDBC URL: jdbc:h2:mem:linkedme_users
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── JPA / Hibernate ──────────────────────────────────────────
# "update" keeps existing data across restarts and applies schema changes.
# Use "create-drop" only if you want a clean DB every time.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Batch inserts/updates — Hibernate groups multiple writes into one round-trip.
# This is a major performance win when saving multiple entities.
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Generate optimized SQL (avoid n+1 queries)
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# SQL logging — enable during debugging, disable for performance
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Generate statistics (useful for finding slow queries during development)
spring.jpa.properties.hibernate.generate_statistics=false

# ─── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=when-authorized

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.linkedme=INFO
logging.level.org.springframework.security=WARN
# Uncomment below to see actual SQL queries and parameters during debugging:
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
