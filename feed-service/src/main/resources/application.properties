server.port=8085

spring.application.name=feed-service

# Kafka Streams Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.streams.application-id=feed-service
spring.kafka.streams.default-key-serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.default-value-serde=org.apache.kafka.common.serialization.Serdes$StringSerde

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.com.linkedme=DEBUG
logging.level.org.apache.kafka.streams=INFO
